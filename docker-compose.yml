version: '3.9'

services:
  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: govservices-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: govservices
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - govservices-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/govservices --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: govservices-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/govservices?authSource=admin
    ports:
      - "5000:5000"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - govservices-net
    healthcheck:
      test: wget -qO- http://localhost:5000/api/v1/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: govservices-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - govservices-net

  # ─── NGINX Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: govservices-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - govservices-net

volumes:
  mongo_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  govservices-net:
    driver: bridge
